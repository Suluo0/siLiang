services:
  # ── PostgreSQL ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: topicsystem-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Xswl1139
      POSTGRES_DB: topic
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        sleep 3 && psql -U postgres -d topic -c 'CREATE SCHEMA IF NOT EXISTS topic;' &&
        wait
      "
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Etcd (Milvus metadata) ──
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: topicsystem-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      retries: 5

  # ── MinIO (Milvus object storage) ──
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: topicsystem-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # ── Milvus 2.4 Standalone ──
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: topicsystem-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI 应用 ──
  app:
    build: .
    container_name: topicsystem-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgres://postgres:Xswl1139@postgres:5432/topic"
      MILVUS_HOST: "milvus"
      MILVUS_PORT: "19530"
      TS_DS_APIKEY: "${TS_DS_APIKEY:-}"
      API_ADDRESS: "${API_ADDRESS:-https://api.deepseek.com/v1}"
      API_MODEL: "${API_MODEL:-deepseek-chat}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # ── Vue 前端 (Nginx) ──
  web:
    build:
      context: ./TOPICSYSTEM_Web
      dockerfile: Dockerfile
    container_name: topicsystem-web
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
