name: Deploy to Production

on:
  push:
    branches: [main]
    # 改这些路径不部署（纯文档/前端无关后端）
    paths-ignore:
      - 'docs/**'
      - 'README*.md'
      - 'DESIGN.md'
      - '.opencode/**'
      - 'TOPICSYSTEM_Web/**'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync + remote deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY 未配置，部署中止"
            echo "::error::请在 GitHub repo Settings → Secrets and variables → Actions 添加 DEPLOY_SSH_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 115.190.161.132 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude='.git/' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='.ruff_cache/' \
            --exclude='htmlcov/' \
            --exclude='.coverage' \
            --exclude='.env' \
            --exclude='.env.test' \
            --exclude='.env.local' \
            --exclude='.opencode/' \
            --exclude='node_modules/' \
            --exclude='TOPICSYSTEM_Web/dist/' \
            --exclude='TOPICSYSTEM_Web/node_modules/' \
            --exclude='relay-server/' \
            --exclude='test_output/' \
            --exclude='.DS_Store' \
            --exclude='._.*' \
            ./ root@115.190.161.132:/opt/siLiang/

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@115.190.161.132 \
            "cd /opt/siLiang && bash scripts/deploy.sh"

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@115.190.161.132 \
            "curl -sf --max-time 5 http://localhost:8000/ping || (echo 'Smoke test failed'; exit 1)"
          echo "✅ Production /ping responding"
